<polyline points="904,110 940,110 940,200 966,200" fill="none" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="904" y1="220" x2="966" y2="220" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow)"/>
<polyline points="904,330 940,330 940,240 966,240" fill="none" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="40" y="320" width="560" height="110" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4"/>
<text x="320.0" y="349.5" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="700" fill="#334155">Cách tính tồn chốt</text>
<text x="320.0" y="366.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#334155">Tồn chốt = Σ (nhập vào − xuất khỏi) vị trí nội bộ</text>
<text x="320.0" y="383.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#334155">tính đến thời điểm chốt, chỉ move line "done".</text>
<text x="320.0" y="400.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#334155">Xem tồn hiện tại: nút "Hiện có" trên sản phẩm.</text>
</svg>