<text x="680" y="408" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#9A3412">Trưởng phòng của người nhận</text>
<line x1="680" y1="448" x2="680" y2="484" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrow)"/>
