<rect x="540.0" y="852" width="280" height="82" rx="10" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
<text x="680" y="876" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#9A3412">Bước 6 · Đã nhận hàng</text>
<text x="680" y="896" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#9A3412">Người nhận hàng xác nhận</text>
<line x1="680" y1="936" x2="680" y2="972" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrow)"/>
