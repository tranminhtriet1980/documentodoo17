<text x="1180" y="164" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#075985">Chuyển hàng kho A → kho B</text>
<line x1="1180" y1="204" x2="1180" y2="240" stroke="#0284C7" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="1040.0" y="242" width="280" height="82" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
<text x="1180" y="266" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#075985">Thông báo / Tạo phiếu nhập</text>
<text x="1180" y="286" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#075985">Báo đơn vị nhận lập phiếu nhập</text>
<line x1="1180" y1="326" x2="1180" y2="362" stroke="#0284C7" stroke-width="2.5" marker-end="url(#arrow)"/>
