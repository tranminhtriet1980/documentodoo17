<text x="1180" y="388" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#1E3A8A">Phiếu nhập kho (kho B)</text>
<text x="1180" y="408" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#1E3A8A">Chép dòng SP, liên kết phiếu gốc</text>
<line x1="1180" y1="448" x2="1180" y2="484" stroke="#0284C7" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="1040.0" y="486" width="280" height="82" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 4"/>
<text x="1180" y="510" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#14532D">→ Vào quy trình Nhập kho</text>
<text x="1180" y="530" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#14532D">Duyệt KTT → Validate cộng tồn</text>
<rect x="40.0" y="600" width="280" height="190" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4"/>
<text x="180" y="624" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#334155">Quy ước màu</text>
<rect x="58.0" y="645" width="16" height="16" rx="3" fill="#6B7280"/>
<text x="82.0" y="654" text-anchor="start" dominant-baseline="middle" font-size="12" font-weight="700" fill="#334155">Xám: điểm bắt đầu (soạn phiếu)</text>
<rect x="58.0" y="672" width="16" height="16" rx="3" fill="#2563EB"/>
<text x="82.0" y="681" text-anchor="start" dominant-baseline="middle" font-size="12" font-weight="700" fill="#334155">Xanh dương: Nhập kho — duyệt KTT</text>
<rect x="58.0" y="699" width="16" height="16" rx="3" fill="#EA580C"/>
<text x="82.0" y="708" text-anchor="start" dominant-baseline="middle" font-size="12" font-weight="700" fill="#334155">Cam: Xuất kho — 6 bước duyệt</text>
<rect x="58.0" y="726" width="16" height="16" rx="3" fill="#0284C7"/>
<text x="82.0" y="735" text-anchor="start" dominant-baseline="middle" font-size="12" font-weight="700" fill="#334155">Xanh ngọc: Luân chuyển nội bộ</text>
<rect x="58.0" y="753" width="16" height="16" rx="3" fill="#16A34A"/>
<text x="82.0" y="762" text-anchor="start" dominant-baseline="middle" font-size="12" font-weight="700" fill="#334155">Xanh lá: Validate cộng / trừ tồn</text>
<rect x="40.0" y="812" width="280" height="118" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" stroke-dasharray="6 4"/>
<text x="180" y="836" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#374151">Kiểm kê tồn kho</text>
<text x="180" y="856" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#374151">Dùng Điều chỉnh tồn chuẩn Odoo</text>
<text x="180" y="872" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#374151">Không qua duyệt KTT / 6 bước</text>
<text x="180" y="888" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#374151">Không bị chặn thiếu tồn</text>
<rect x="1040.0" y="600" width="280" height="118" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4"/>
<text x="1180" y="624" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#78350F">Chặn xuất vượt tồn</text>
<text x="1180" y="644" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#78350F">Kiểm tồn khả dụng 3 thời điểm:</text>
<text x="1180" y="660" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#78350F">Gửi yêu cầu · Xác nhận · Validate</text>
<text x="1180" y="676" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#78350F">Không cho xuất âm kho</text>
<rect x="1040.0" y="772" width="280" height="118" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" stroke-dasharray="6 4"/>
<text x="1180" y="796" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#075985">Báo cáo kho theo kỳ</text>
<text x="1180" y="816" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#075985">Tồn kho · Nhập kho · Xuất kho</text>
<text x="1180" y="832" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#075985">Theo ngày · tháng · năm</text>
<text x="1180" y="848" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#075985">Danh sách + Pivot, có Mã SP</text>
