<text x="180" y="164" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#374151">Thủ kho tạo phiếu, thêm dòng SP</text>
<line x1="180" y1="204" x2="180" y2="240" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="40.0" y="242" width="280" height="82" rx="10" fill="#EAF2FF" stroke="#2563EB" stroke-width="2"/>
<text x="180" y="266" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#1E3A8A">Bước 1 · Gửi KTT phê duyệt</text>
<text x="180" y="286" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#1E3A8A">Nháp → Chờ KTT (tự xác nhận)</text>
<line x1="180" y1="326" x2="180" y2="362" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
