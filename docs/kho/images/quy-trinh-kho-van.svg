<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1100" viewBox="0 0 1360 1100">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:Arial,Helvetica,sans-serif}</style>
<text x="680.0" y="44" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="800" fill="#1F2937">QUY TRÌNH KHO VẬN EDUPATH</text>
<text x="680.0" y="68" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#6B7280">Nhập kho (duyệt KTT) · Xuất kho (6 bước phê duyệt) · Luân chuyển nội bộ — nút xanh lá là Validate cộng/trừ tồn</text>
<text x="180" y="92" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#2563EB">NHẬP KHO</text>
<text x="180" y="110" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#2563EB">2 bước duyệt + Validate</text>
<text x="680" y="92" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#EA580C">XUẤT KHO</text>
<text x="680" y="110" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#EA580C">6 bước phê duyệt + Validate</text>
<text x="1180" y="92" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#0284C7">LUÂN CHUYỂN NỘI BỘ</text>
<text x="1180" y="110" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#0284C7">→ chuyển sang phiếu nhập</text>
