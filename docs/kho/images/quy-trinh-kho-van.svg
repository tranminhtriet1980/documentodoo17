<text x="180" y="388" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#1E3A8A">Bước 2 · KTT phê duyệt</text>
<text x="180" y="408" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#1E3A8A">Chờ KTT → Đã duyệt · KTT nhập</text>
<line x1="180" y1="448" x2="180" y2="484" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
