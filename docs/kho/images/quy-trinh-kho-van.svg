<rect x="540.0" y="730" width="280" height="82" rx="10" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
<text x="680" y="754" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#9A3412">Bước 5 · Thủ kho chuẩn bị xong</text>
<text x="680" y="774" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#9A3412">Thủ kho chi nhánh soạn hàng</text>
