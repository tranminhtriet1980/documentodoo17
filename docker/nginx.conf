# (bản sao) File chính dùng khi build: ../nginx.conf cùng thư mục Dockerfile
# HTTP — port 4546
server {
    listen 4546;
    listen [::]:4546;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# HTTPS — port 4547
server {
    listen 4547 ssl;
    listen [::]:4547 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
