# HTTP — port 4546
server {
    listen 4546;
    listen [::]:4546;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location @technical_401 {
        internal;
        add_header WWW-Authenticate 'Basic realm="Ky thuat - dang nhap de xem tai lieu"' always;
        default_type text/html;
        return 401 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Chuyen huong</title><script>(function(){var h=(location.hostname==="docs.edupath.org.vn"||/\\.edupath\\.org\\.vn$/i.test(location.hostname))?"https://docs.edupath.org.vn/":(location.origin+"/index.html");location.replace(h);})();</script></head><body><p>Dang chuyen ve trang chu...</p></body></html>';
    }

    location /technical {
        auth_basic "Ky thuat - dang nhap de xem tai lieu";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 = @technical_401;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# HTTPS — port 4547
server {
    listen 4547 ssl;
    listen [::]:4547 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location @technical_401 {
        internal;
        add_header WWW-Authenticate 'Basic realm="Ky thuat - dang nhap de xem tai lieu"' always;
        default_type text/html;
        return 401 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Chuyen huong</title><script>(function(){var h=(location.hostname==="docs.edupath.org.vn"||/\\.edupath\\.org\\.vn$/i.test(location.hostname))?"https://docs.edupath.org.vn/":(location.origin+"/index.html");location.replace(h);})();</script></head><body><p>Dang chuyen ve trang chu...</p></body></html>';
    }

    location /technical {
        auth_basic "Ky thuat - dang nhap de xem tai lieu";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 = @technical_401;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
