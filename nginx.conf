# HTTP — port 4546
server {
    listen 4546;
    listen [::]:4546;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location = /technical-401.html {
        internal;
        add_header WWW-Authenticate 'Basic realm="Ky thuat - dang nhap de xem tai lieu"' always;
    }

    location = /functional-401.html {
        internal;
        add_header WWW-Authenticate 'Basic realm="Chuc nang - dang nhap de xem tai lieu"' always;
    }

    location ^~ /technical {
        auth_basic "Ky thuat - dang nhap de xem tai lieu";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 =401 /technical-401.html;
        try_files $uri $uri/ =404;
    }

    location ^~ /functional {
        auth_basic "Chuc nang - dang nhap de xem tai lieu";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 =401 /functional-401.html;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# HTTPS — port 4547
server {
    listen 4547 ssl;
    listen [::]:4547 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location = /technical-401.html {
        internal;
        add_header WWW-Authenticate 'Basic realm="Ky thuat - dang nhap de xem tai lieu"' always;
