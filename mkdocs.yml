site_name: Tài liệu Odoo 17
site_description: Tài liệu Odoo 17 tiếng Việt — Hướng dẫn người dùng, Chức năng (đang phát triển) & Kỹ Thuật
site_author: Edupath

use_directory_urls: false

theme:
  name: material
  language: vi
  # Logo EduPath trên header + favicon (SVG trong docs/assets)
  logo: assets/edupath-logo.svg
  favicon: assets/edupath-mark.svg
  font:
    text: Be Vietnam Pro
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Chế độ tối
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Chế độ sáng

plugins:
  - search:
      lang:
        - vi
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/ai-assistant.css

extra_javascript:
  - javascripts/protect-content.js
  - javascripts/technical-home-redirect.js
  - javascripts/ai-assistant.js

extra:
  social: []
  generator: false

