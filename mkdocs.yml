site_name: Tài liệu Odoo 17
site_description: Tài liệu Odoo 17 tiếng Việt — Tính năng (Functional) & Kỹ thuật (Technical)
site_author: Edupath

use_directory_urls: false

theme:
  name: material
  language: vi
  # Không dùng logo hình (Material icon / Odoo) — chỉ chữ tiêu đề trên header
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Chế độ tối
    - scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Chế độ sáng

plugins:
  - search:
      lang:
        - vi
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/protect-content.js
  - javascripts/technical-home-redirect.js

extra:
  social: []
  generator: false

